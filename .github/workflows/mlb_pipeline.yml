name: MLB Pipeline Daily

on:
  schedule:
    - cron: '0 12 * * *'  # 8:00am EDT (12:00 UTC)
    - cron: '0 18 * * *'  # 2:00pm EDT (18:00 UTC)
  workflow_dispatch:

jobs:
  run-mlb-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybaseball requests python-dotenv beautifulsoup4 scikit-learn numpy

      - name: Run pitcher stats update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd mlb_pipeline
          python pitcher_stats.py

      - name: Run bullpen stats update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd mlb_pipeline
          python bullpen_stats.py

      - name: Run team offense stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd mlb_pipeline
          python team_stats.py

      - name: Run Savant enrichment (OAA, xwOBA, barrel%, catcher framing)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd mlb_pipeline
          python savant_enrichment.py

      - name: Run game context pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: |
          cd mlb_pipeline
          python game_context.py

      - name: Update team HR threats (morning run — 11am UTC-13am UTC range)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          HOUR=$(date -u +%H)
          # Accept 11-13 UTC to cover 8am ET across EDT/EST/DST transitions
          if [ "$HOUR" = "11" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "13" ]; then
            echo "Morning ET run (UTC hour $HOUR) — updating team HR threats"
            cd mlb_pipeline
            python team_hr_threats.py
          else
            echo "Skipping HR threats update (UTC hour $HOUR — not morning ET)"
          fi

      - name: Build HR Watch (afternoon run — 17-19 UTC range)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          HOUR=$(date -u +%H)
          # Accept 17-19 UTC to cover 2pm ET across EDT/EST
          if [ "$HOUR" = "17" ] || [ "$HOUR" = "18" ] || [ "$HOUR" = "19" ]; then
            echo "Afternoon ET run (UTC hour $HOUR) — building HR Watch candidates"
            cd mlb_pipeline
            python build_hr_watch.py
          else
            echo "Skipping HR Watch build (UTC hour $HOUR — not afternoon ET)"
          fi

      - name: Generate pipeline props (afternoon run — needs confirmed lineups)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "17" ] || [ "$HOUR" = "18" ] || [ "$HOUR" = "19" ]; then
            echo "Afternoon ET run — generating pipeline props from confirmed lineups"
            cd mlb_pipeline
            python generate_props.py
          else
            echo "Skipping prop generation (UTC hour $HOUR — afternoon only)"
          fi

      - name: Generate Daily Degen (afternoon — after props)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "17" ] || [ "$HOUR" = "18" ] || [ "$HOUR" = "19" ]; then
            echo "Afternoon ET run — building Daily Degen parlay from pipeline picks"
            cd mlb_pipeline
            python generate_daily_degen.py
          else
            echo "Skipping Daily Degen (UTC hour $HOUR — afternoon only)"
          fi

      - name: Generate Dawg of the Day (morning ET run)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "11" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "13" ]; then
            echo "Morning ET run — generating Dawg of the Day"
            cd mlb_pipeline
            python generate_dawg_of_day.py
          else
            echo "Skipping Dawg generation (UTC hour $HOUR — morning only)"
          fi

      - name: Update umpire database (Mondays only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          DAY=$(date -u -d '-4 hours' +%u)
          if [ "$DAY" = "1" ]; then
            echo "Monday — updating umpire database"
            cd mlb_pipeline
            python umpires_scrape.py
          else
            echo "Not Monday (day=$DAY) — skipping umpire update"
          fi

      - name: Run UFC card scraper (Thursdays only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          DAY=$(date -u -d '-4 hours' +%u)
          if [ "$DAY" = "4" ]; then
            echo "Thursday — running UFC card scraper"
            cd mlb_pipeline
            python ufc_card_scraper.py
          else
            echo "Not Thursday (day=$DAY) — skipping UFC scraper"
          fi
      
      - name: Resolve prop grades
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: |
          cd mlb_pipeline
          python resolve_props.py

      - name: Resolve NRFI results
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd mlb_pipeline
          python resolve_nrfi.py

      - name: Resolve game results
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd mlb_pipeline
          python resolve_game_results.py

      - name: Run NBA team stats update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: |
          cd mlb_pipeline
          python nba_pipeline.py

      - name: Generate Play of the Day
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          cd mlb_pipeline
          python play_of_day.py