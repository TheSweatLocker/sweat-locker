name: MLB Pipeline Daily

on:
  schedule:
    - cron: '0 12 * * *'  # 8am ET
    - cron: '0 18 * * *'  # 2pm ET — catches late pitcher scratches
  workflow_dispatch:

jobs:
  run-mlb-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybaseball requests python-dotenv

      - name: Run game context pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: |
          cd mlb_pipeline
          python game_context.py

      - name: Run pitcher stats update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd mlb_pipeline
          python pitcher_stats.py
          
          - name: Run bullpen stats update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd mlb_pipeline
          python bullpen_stats.py
